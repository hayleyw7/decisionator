<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Decisionator  pick one at random">
  <rect width="1200" height="630" fill="#040303"/>
  <rect x="0" y="0" width="1200" height="120" fill="#3a4e48"/>

  <text x="600" y="78" text-anchor="middle" fill="#ffffff" font-family="Courier New, Courier, monospace" font-size="56" font-weight="700">Decisionator</text>

  <rect x="180" y="200" width="240" height="140" rx="12" fill="#beb0a7"/>
  <rect x="480" y="200" width="240" height="140" rx="12" fill="#beb0a7"/>
  <rect x="780" y="200" width="240" height="140" rx="12" fill="#8b9d83" stroke="#ffffff" stroke-width="4"/>

  <text x="300" y="285" text-anchor="middle" fill="#282c34" font-family="Courier New, Courier, monospace" font-size="28">Option A</text>
  <text x="600" y="285" text-anchor="middle" fill="#282c34" font-family="Courier New, Courier, monospace" font-size="28">Option B</text>
  <text x="900" y="285" text-anchor="middle" fill="#282c34" font-family="Courier New, Courier, monospace" font-size="32" font-weight="700">Winner</text>

  <text x="600" y="420" text-anchor="middle" fill="#8b9d83" font-family="Courier New, Courier, monospace" font-size="40">Stuck choosing? Let the app decide.</text>

  <rect x="430" y="470" width="340" height="64" rx="32" fill="#6a7b76"/>
  <text x="600" y="514" text-anchor="middle" fill="#ffffff" font-family="Courier New, Courier, monospace" font-size="28" font-weight="700">Make Decision</text>

  <text x="600" y="590" text-anchor="middle" fill="#beb0a7" font-family="Courier New, Courier, monospace" font-size="26">decisionator.surge.sh</text>
</svg>
